<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網代建設 — 不動産物件管理</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:       #F5F5F0;
      --bg-sidebar:    #FFFFFF;
      --bg-card:       #FFFFFF;
      --bg-card-hover: #F0F0EB;
      --bg-input:      #F0F0EB;
      --border:        #E0E0D8;
      --accent:        #2a7ae2;
      --accent-dim:    #deeafc;
      --text-primary:  #1a1a1a;
      --text-secondary:#555555;
      --text-muted:    #999990;
      --green:         #2e9e68;
      --yellow:        #d4920a;
      --red:           #c94040;
      --purple:        #7b5cc4;
      --sidebar-w:     220px;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── サイドバー ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
    }
    .sidebar-logo { padding: 20px 18px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-logo .company { font-size: 11px; color: var(--text-muted); letter-spacing: .08em; }
    .sidebar-logo .name    { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-top: 2px; }
    .sidebar-logo .badge   {
      display: inline-block; margin-top: 6px;
      font-size: 10px; font-weight: 500;
      background: var(--accent-dim); color: var(--accent);
      padding: 2px 8px; border-radius: 10px;
    }
    .sidebar nav { flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 18px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .nav-item:hover  { background: var(--bg-card); color: var(--text-primary); }
    .nav-item.active { background: var(--accent-dim); color: var(--accent); border-right: 2px solid var(--accent); }
    .nav-item .icon  { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
    .nav-group-label {
      padding: 14px 18px 4px;
      font-size: 10px; font-weight: 700;
      color: var(--text-muted); letter-spacing: .1em;
      text-transform: uppercase;
    }
    .sidebar-footer {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-muted);
    }

    /* ── メイン ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 28px 32px;
      min-width: 0;
    }

    /* ── ヘッダー ── */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .page-title { font-size: 20px; font-weight: 700; color: var(--text-primary); }
    .page-sub   { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

    /* ── セクション ── */
    .section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 22px;
    }
    .section-title {
      font-size: 13px; font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title .icon { font-size: 16px; }

    /* ── フィルタタブ ── */
    .filter-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
    .filter-tab {
      padding: 6px 16px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      border-radius: 6px;
      font-size: 12px; font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .filter-tab:hover  { background: var(--bg-card-hover); }
    .filter-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── データテーブル ── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .data-table th {
      padding: 8px 10px;
      background: var(--bg-input);
      border-bottom: 2px solid var(--border);
      font-size: 11px; font-weight: 700;
      color: var(--text-muted); letter-spacing: .04em;
      text-align: left;
      white-space: nowrap;
    }
    .data-table td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover td { background: var(--bg-card-hover); }

    /* ── 情報テーブル ── */
    .info-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .info-table th {
      padding: 7px 12px;
      font-size: 11px; font-weight: 700;
      color: var(--text-muted);
      white-space: nowrap;
      text-align: left;
      width: 120px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-input);
    }
    .info-table td {
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
    }
    .info-table tr:last-child th,
    .info-table tr:last-child td { border-bottom: none; }

    /* ── 2カラム ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 960px) { .two-col { grid-template-columns: 1fr; } }

    /* ── 写真グリッド ── */
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .photo-item {
      position: relative;
      aspect-ratio: 4/3;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; }
    .photo-delete {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,.6); color: #fff;
      border: none; border-radius: 50%;
      width: 22px; height: 22px;
      font-size: 11px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity .15s;
    }
    .photo-item:hover .photo-delete { opacity: 1; }
    .photo-add {
      aspect-ratio: 4/3;
      border: 2px dashed var(--border);
      border-radius: 8px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
      gap: 4px;
    }
    .photo-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    /* ── チェックリスト ── */
    .check-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
    }
    .check-item:last-child { border-bottom: none; }

    /* ── 実施記録 ── */
    .log-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .log-row:last-child { border-bottom: none; }
    .log-thumbs { display:flex; gap:5px; flex-wrap:wrap; margin-top:6px; }
    .log-thumb  { width:52px; height:52px; object-fit:cover; border-radius:4px; border:1px solid var(--border); cursor:pointer; transition:opacity .15s; }
    .log-thumb:hover { opacity:.8; }

    /* ── フォーム ── */
    .form-section {
      font-size: 11px; font-weight: 700;
      color: var(--text-muted); letter-spacing: .1em;
      text-transform: uppercase;
      margin: 16px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .form-section:first-child { margin-top: 0; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label {
      font-size: 11px; font-weight: 600;
      color: var(--text-muted); letter-spacing: .04em;
    }
    .qs-control {
      padding: 8px 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 13px; font-family: inherit;
      appearance: none; -webkit-appearance: none;
      width: 100%;
    }
    .qs-control:focus { outline: none; border-color: var(--accent); }
    textarea.qs-control { resize: vertical; }

    /* ── 取得書類チェックボックス ── */
    .doc-checkboxes {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
    }
    .doc-check-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; cursor: pointer;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--bg-input);
      transition: all .15s;
      user-select: none;
    }
    .doc-check-label:hover { background: var(--accent-dim); border-color: var(--accent); }
    .doc-check-label.checked { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .doc-check-label input { width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; }

    /* ── 築年月表示 ── */
    .built-display {
      font-size: 12px; color: var(--accent);
      padding: 6px 12px;
      background: var(--accent-dim);
      border-radius: 6px;
      margin-bottom: 10px;
      min-height: 30px;
      display: flex; align-items: center;
    }

    /* ── モーダル ── */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 500;
      padding: 20px;
    }
    .modal-bg.hidden { display: none; }
    .modal {
      background: var(--bg-card);
      border-radius: 12px;
      width: 100%;
      max-width: 680px;
      max-height: 92vh;
      display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-title { font-size: 15px; font-weight: 700; }
    .modal-close {
      background: none; border: none;
      font-size: 18px; color: var(--text-muted);
      cursor: pointer; padding: 4px; line-height: 1;
    }
    .modal-close:hover { color: var(--text-primary); }
    .modal-body { padding: 20px 22px; overflow-y: auto; flex: 1; }
    .modal-footer {
      display: flex; justify-content: flex-end; gap: 10px;
      padding: 14px 22px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── ボタン ── */
    .btn-primary {
      padding: 8px 18px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 6px;
      font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: opacity .15s; white-space: nowrap;
    }
    .btn-primary:hover { opacity: .85; }
    .btn-cancel {
      padding: 8px 18px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 6px; font-size: 13px; font-weight: 500; font-family: inherit;
      color: var(--text-secondary); cursor: pointer;
    }
    .btn-cancel:hover { background: var(--bg-card-hover); }
    .btn-secondary {
      padding: 8px 18px;
      background: #e8f4ee;
      color: var(--green);
      border: 1px solid #b8dfc8;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .btn-secondary:hover { opacity: .85; }
    .btn-danger {
      padding: 6px 12px;
      background: #3a1e1e; color: var(--red);
      border: 1px solid #c94040; border-radius: 6px;
      font-size: 12px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: opacity .15s; white-space: nowrap;
    }
    .btn-danger:hover { opacity: .8; }
    .btn-sm {
      padding: 4px 10px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 5px; font-size: 11px; font-weight: 600; font-family: inherit;
      color: var(--text-secondary); cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .btn-sm:hover { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
    .btn-back {
      padding: 6px 14px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: 6px;
      font-size: 12px; font-weight: 600; font-family: inherit;
      color: var(--text-secondary); cursor: pointer;
    }
    .btn-back:hover { background: var(--bg-card-hover); }

    /* ── バッジ ── */
    .badge-active   { font-size: 10px; background: #1a3a1e; color: var(--green);  padding: 2px 8px; border-radius: 6px; font-weight: 600; white-space: nowrap; }
    .badge-inactive { font-size: 10px; background: #2a2d35; color: var(--text-muted); padding: 2px 8px; border-radius: 6px; font-weight: 600; white-space: nowrap; }
    .badge-sold-s   { font-size: 10px; background: #cc0000; color: #ffffff;       padding: 2px 8px; border-radius: 6px; font-weight: 600; white-space: nowrap; }
    .badge-preparing{ font-size: 10px; background: #2a2010; color: #f0c040;       padding: 2px 8px; border-radius: 6px; font-weight: 600; white-space: nowrap; }
    .badge-land     { font-size: 10px; background: #1a5c2a; color: #90ee90;       padding: 2px 8px; border-radius: 6px; font-weight: 600; white-space: nowrap; }
    .badge-house    { font-size: 10px; background: var(--accent-dim); color: var(--accent); padding: 2px 8px; border-radius: 6px; font-weight: 600; white-space: nowrap; }
    .badge-done     { font-size: 10px; background: #3a2e10; color: var(--yellow); padding: 2px 8px; border-radius: 6px; font-weight: 600; white-space: nowrap; }
    .badge-suumo    { font-size: 9px;  background: #e8f0fe; color: #1a73e8;       padding: 1px 5px; border-radius: 4px; font-weight: 700; white-space: nowrap; display: inline-block; margin-left: 3px; }
    .badge-owner    { font-size: 10px; background: #555555; color: #d4a8ff;       padding: 2px 7px; border-radius: 6px; font-weight: 600; white-space: nowrap; }
    .badge-broker   { font-size: 10px; background: #555555; color: #6ab0ff;       padding: 2px 7px; border-radius: 6px; font-weight: 600; white-space: nowrap; }
    .badge-sign     { font-size: 9px;  background: #3a1e0a; color: #f0830a;       padding: 1px 5px; border-radius: 4px; font-weight: 700; white-space: nowrap; display: inline-block; }
    .badge-hp       { font-size: 9px;  background: #4a1a7a; color: #d4a8ff;       padding: 1px 5px; border-radius: 4px; font-weight: 700; white-space: nowrap; display: inline-block; }
    .badge-managed  { font-size: 9px;  background: #1a3a4a; color: #7fd4f0;       padding: 1px 5px; border-radius: 4px; font-weight: 700; white-space: nowrap; display: inline-block; }

    /* ── マップリンク ── */
    .map-link {
      font-size: 11px; color: var(--accent);
      text-decoration: none; margin-left: 8px;
    }
    .map-link:hover { text-decoration: underline; }

    /* ── トースト ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 12px 20px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,.2);
    }
    .toast.hidden { display: none; }
    .toast-success { background: #1a3a1e; color: var(--green); border: 1px solid var(--green); }
    .toast-error   { background: #3a1e1e; color: var(--red);   border: 1px solid var(--red); }
    .toast-info    { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); }

    /* ── セットアップ画面 ── */
    .setup-card {
      max-width: 520px; margin: 60px auto;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 36px 40px;
    }
    .setup-card h2 { font-size: 18px; margin-bottom: 8px; }
    .setup-card p  { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
    .setup-card code {
      display: block; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 12px 14px; font-size: 12px; font-family: monospace;
      color: var(--accent); margin-bottom: 16px; word-break: break-all;
    }
  </style>
</head>
<body>

<!-- ========== サイドバー ========== -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="company">株式会社</div>
    <div class="name">網代建設</div>
    <span class="badge">物件管理システム</span>
  </div>
  <nav>
    <div class="nav-group-label">メニュー</div>
    <a class="nav-item" id="nav-list" onclick="showList()" href="#">
      <span class="icon">🏠</span>物件一覧
    </a>
    <a class="nav-item" id="nav-logs" onclick="showLogs()" href="#">
      <span class="icon">📋</span>記録台帳
    </a>
  </nav>
  <div class="sidebar-footer">
    代表：安部憲人<br>
    米沢市本町2丁目1-12
  </div>
</aside>

<!-- ========== メインコンテンツ ========== -->
<main class="main" id="content">
  <div style="padding:60px;text-align:center;color:var(--text-muted);">読み込み中…</div>
</main>

<!-- ========== モーダル ========== -->
<div id="modal-bg" class="modal-bg hidden" onclick="closeModalBg(event)">
  <div class="modal" id="modal"></div>
</div>

<!-- ========== トースト ========== -->
<div id="toast" class="toast hidden"></div>

<script>
// ═══════════════════════════════════════════════════════════
// ⚙️ Supabase 接続情報
// ═══════════════════════════════════════════════════════════
const SUPABASE_URL  = 'https://vgidmwnffcopgnzcfsvp.supabase.co';
const SUPABASE_ANON = 'sb_publishable_-MWqGL2IDetS_IvuSYOECw_YSFZN57m';
// ═══════════════════════════════════════════════════════════

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

// ── 取得書類の選択肢 ──
const DOC_OPTIONS = ['登記','公図','案内図','上水道配管図','下水道配管図','地積測量図','道路台帳写し','固定資産税課税明細'];

// ── アプリ状態 ──
let state = {
  view:           'list',
  propId:         null,
  filterType:     'all',
  filterSold:     false,
  checklistItems: [],
  logsFilter:     '',
  detailYear:     new Date().getFullYear(),
};

// ── 初期化 ──
(async () => {
  const { data, error } = await db
    .from('checklist_items').select('*').order('order_index');
  if (error) toast('チェックリスト取得失敗: ' + error.message, 'error');
  state.checklistItems = data || [];
  await showList();
})();

// ════════════════════════════════════════════════════════════
// ナビゲーション
// ════════════════════════════════════════════════════════════

async function showList() {
  state.view = 'list';
  setActiveNav('nav-list');
  await renderList();
}

async function showDetail(propId) {
  state.view   = 'detail';
  state.propId = propId;
  setActiveNav('');
  await renderDetail(propId);
}

async function showLogs(filterPropId) {
  state.view       = 'logs';
  state.logsFilter = filterPropId || '';
  setActiveNav('nav-logs');
  await renderLogs(state.logsFilter);
}

function setActiveNav(id) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.id === id);
  });
}

// ════════════════════════════════════════════════════════════
// 物件一覧ビュー
// ════════════════════════════════════════════════════════════

async function renderList() {
  const el = document.getElementById('content');
  el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted);">読み込み中…</div>';

  let q = db.from('properties')
    .select('*, property_details(*)')
    .order('created_at', { ascending: false });


  const { data: allProps, error } = await q;
  if (error) { toast('データ取得失敗: ' + error.message, 'error'); return; }

  const all       = allProps || [];
  const lands     = all.filter(p => p.type === 'land'  && p.property_details?.transaction_type !== 'managed' && !p.is_sold);
  const houses    = all.filter(p => p.type === 'house' && p.property_details?.transaction_type !== 'managed' && !p.is_sold);
  const managed   = all.filter(p => p.property_details?.transaction_type === 'managed' && !p.is_sold);
  const soldProps = all.filter(p => p.is_sold);

  const ownerFirst = arr => [...arr].sort((a, b) => {
    const ta = a.property_details?.transaction_type === 'owner' ? 0 : 1;
    const tb = b.property_details?.transaction_type === 'owner' ? 0 : 1;
    return ta - tb;
  });

  let displayed;
  if      (state.filterType === 'land')    displayed = ownerFirst(lands);
  else if (state.filterType === 'house')   displayed = ownerFirst(houses);
  else if (state.filterType === 'managed') displayed = managed;
  else if (state.filterType === 'sold')    displayed = soldProps;
  else                                     displayed = all;

  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">🏠 物件一覧</div>
        <div class="page-sub">土地 ${lands.length}件 ／ 中古住宅 ${houses.length}件 ／ 管理物件 ${managed.length}件 ／ 成約済み ${soldProps.length}件</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <button class="btn-primary" onclick="openAddModal('land')">＋ 土地を追加</button>
        <button class="btn-primary" onclick="openAddModal('house')">＋ 中古住宅を追加</button>
      </div>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab ${state.filterType==='land'    ?'active':''}" onclick="state.filterType='land';renderList()">🌐 土地（${lands.length}）</button>
      <button class="filter-tab ${state.filterType==='house'   ?'active':''}" onclick="state.filterType='house';renderList()">🏡 中古住宅（${houses.length}）</button>
      <button class="filter-tab ${state.filterType==='managed' ?'active':''}" onclick="state.filterType='managed';renderList()">🔧 管理物件（${managed.length}）</button>
      <button class="filter-tab ${state.filterType==='sold'    ?'active':''}" onclick="state.filterType='sold';renderList()" style="${state.filterType==='sold' ? '' : 'color:#cc0000;'}">🔴 成約済み（${soldProps.length}）</button>
      <button class="filter-tab ${state.filterType==='all'     ?'active':''}" onclick="state.filterType='all';renderList()">全て（${all.length}）</button>
    </div>

    ${displayed.length === 0
      ? `<div class="section" style="text-align:center;padding:40px;color:var(--text-muted);">
           該当する物件がありません。
         </div>`
      : `<div class="section" style="padding:0;overflow:hidden;">
           <div style="overflow-x:auto;">${buildListTable(displayed)}</div>
         </div>`
    }
  `;
}

function buildListTable(props) {
  const t = state.filterType;

  // SUUMO + status セル
  const statusCell = (p) => {
    const d = p.property_details || {};
    return `<div style="display:flex;flex-direction:column;gap:3px;">
      ${statusBadge(p.status)}
      ${d.suumo_listed   ? '<span class="badge-suumo">SUUMO掲載</span>' : ''}
      ${d.hp_listed      ? '<span class="badge-hp">🌐 HP掲載</span>' : ''}
      ${d.for_sale_sign  ? '<span class="badge-sign">🪧 売看板あり</span>' : ''}
    </div>`;
  };

  // 取引態様バッジ
  const transBadge = (t) => t === 'owner'   ? '<span class="badge-owner">売主</span>'
                           : t === 'broker'  ? '<span class="badge-broker">仲介</span>'
                           : t === 'managed' ? '<span class="badge-managed">管理物件</span>' : '—';

  let heads, rowFn;

  if (t === 'land') {
    heads = ['掲載 / SUUMO', 'コード', '物件名', '販売価格', '面積(坪)', '用途地域', '学区（小）', '学区（中）', '取引態様', '販売形態', '売買完了', ''];
    rowFn = p => {
      const d = p.property_details || {};
      return `<tr onclick="showDetail('${p.id}')" style="cursor:pointer;">
        <td>${statusCell(p)}</td>
        <td>${esc(p.code||'')}</td>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(p.property_name||p.address||'')}">${esc(p.property_name||p.address||'—')}</td>
        <td style="white-space:nowrap;">${p.price ? p.price.toLocaleString()+'万円' : '—'}</td>
        <td>${d.area_tsubo ? d.area_tsubo+'坪' : '—'}</td>
        <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(d.zoning||'—')}</td>
        <td>${esc(d.school_elementary||'—')}</td>
        <td>${esc(d.school_junior||'—')}</td>
        <td>${transBadge(d.transaction_type)}</td>
        <td style="font-size:12px;white-space:nowrap;">${saleTypeLabel(d.sale_type)}</td>
        <td>${p.is_sold ? '<span class="badge-done">完了</span>' : '—'}</td>
        <td onclick="event.stopPropagation()"><button class="btn-sm" onclick="showDetail('${p.id}')">詳細</button></td>
      </tr>`;
    };
  } else if (t === 'house') {
    heads = ['掲載 / SUUMO', 'コード', '物件名', '販売価格', '土地(坪)', '建物(坪)', '築年月', '間取', '学区（小）', '学区（中）', '取引態様', '販売形態', '売買完了', ''];
    rowFn = p => {
      const d = p.property_details || {};
      return `<tr onclick="showDetail('${p.id}')" style="cursor:pointer;">
        <td>${statusCell(p)}</td>
        <td>${esc(p.code||'')}</td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(p.property_name||p.address||'')}">${esc(p.property_name||p.address||'—')}</td>
        <td style="white-space:nowrap;">${p.price ? p.price.toLocaleString()+'万円' : '—'}</td>
        <td>${d.land_area_tsubo ? d.land_area_tsubo+'坪' : '—'}</td>
        <td>${d.building_area_tsubo ? d.building_area_tsubo+'坪' : '—'}</td>
        <td>${esc(d.built_date||'—')}</td>
        <td>${esc(d.floor_plan||'—')}</td>
        <td>${esc(d.school_elementary||'—')}</td>
        <td>${esc(d.school_junior||'—')}</td>
        <td>${transBadge(d.transaction_type)}</td>
        <td style="font-size:12px;white-space:nowrap;">${saleTypeLabel(d.sale_type)}</td>
        <td>${p.is_sold ? '<span class="badge-done">完了</span>' : '—'}</td>
        <td onclick="event.stopPropagation()"><button class="btn-sm" onclick="showDetail('${p.id}')">詳細</button></td>
      </tr>`;
    };
  } else {
    heads = ['種別', '掲載 / SUUMO', 'コード', '物件名', '販売価格', '面積(坪)', '取引態様', '販売形態', '学区（小）', '売買完了', ''];
    rowFn = p => {
      const d    = p.property_details || {};
      const tsubo = p.type === 'land'
        ? (d.area_tsubo ? d.area_tsubo+'坪' : '—')
        : (d.building_area_tsubo ? d.building_area_tsubo+'坪' : '—');
      return `<tr onclick="showDetail('${p.id}')" style="cursor:pointer;">
        <td>${p.type==='land' ? '<span class="badge-land">土地</span>' : '<span class="badge-house">中古住宅</span>'}</td>
        <td>${statusCell(p)}</td>
        <td>${esc(p.code||'')}</td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(p.property_name||p.address||'')}">${esc(p.property_name||p.address||'—')}</td>
        <td style="white-space:nowrap;">${p.price ? p.price.toLocaleString()+'万円' : '—'}</td>
        <td>${tsubo}</td>
        <td>${transBadge(d.transaction_type)}</td>
        <td style="font-size:12px;white-space:nowrap;">${saleTypeLabel(d.sale_type)}</td>
        <td>${esc(d.school_elementary||'—')}</td>
        <td>${p.is_sold ? '<span class="badge-done">完了</span>' : '—'}</td>
        <td onclick="event.stopPropagation()"><button class="btn-sm" onclick="showDetail('${p.id}')">詳細</button></td>
      </tr>`;
    };
  }

  return `
    <table class="data-table">
      <thead><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${props.map(rowFn).join('')}</tbody>
    </table>
  `;
}

async function renderDetail(id) {
  const el = document.getElementById('content');
  el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted);">読み込み中…</div>';

  const [propRes, photosRes, checksRes, logsRes] = await Promise.all([
    db.from('properties').select('*, property_details(*)').eq('id', id).single(),
    db.from('property_photos').select('*').eq('property_id', id).order('order_index'),
    db.from('checklist_checks').select('*').eq('property_id', id),
    db.from('task_logs').select('*').eq('property_id', id).order('performed_date', { ascending: false }),
  ]);

  if (propRes.error) { toast('物件取得失敗: ' + propRes.error.message, 'error'); return; }

  const prop   = propRes.data;
  const photos = photosRes.data || [];
  const checks = checksRes.data || [];
  const logs   = logsRes.data   || [];
  const det    = prop.property_details || {};
  const isLand = prop.type === 'land';

  window._curProp = prop;
  window._curDet  = det;

  // ── Googleマップリンク ──
  const mapsLink = prop.address
    ? `<a class="map-link" href="https://www.google.com/maps/search/${encodeURIComponent(prop.address)}" target="_blank" rel="noopener">🗺 マップで見る</a>`
    : '';

  // ── 取得書類 ──
  const docs = parseDocuments(det.documents);
  const docsDisplay = docs.length ? docs.join('　') : '—';

  // ── 写真 HTML ──
  const photoHtml = `
    <div class="photo-grid">
      ${photos.map(ph => `
        <div class="photo-item">
          <img src="${esc(ph.url)}" loading="lazy" alt="物件写真"
               onclick="window.open('${esc(ph.url)}','_blank')" style="cursor:pointer;">
          <button class="photo-delete" onclick="deletePhoto('${ph.id}','${esc(ph.storage_path)}','${id}')">✕</button>
        </div>`).join('')}
      ${photos.length < 6 ? `
        <div class="photo-add" onclick="document.getElementById('ph-up').click()">
          <span style="font-size:22px;">＋</span>
          <span style="font-size:11px;">写真を追加</span>
        </div>` : ''}
    </div>
    <input type="file" id="ph-up" accept="image/*" multiple style="display:none"
           onchange="uploadPhotos('${id}',this.files)">
    <div style="font-size:11px;color:var(--text-muted);margin-top:6px;">
      最大 6 枚まで（残り ${6 - photos.length} 枚）
    </div>
  `;

  // ── 間取り図（中古住宅のみ） ──
  const floorHtml = !isLand ? `
    <div class="section" style="margin-top:16px;">
      <div class="section-title"><span class="icon">📐</span>間取り図</div>
      ${det.floor_plan_image
        ? `<div style="margin-bottom:12px;">
             <img src="${esc(det.floor_plan_image)}" alt="間取り図"
                  style="max-width:100%;max-height:400px;border-radius:8px;border:1px solid var(--border);cursor:pointer;"
                  onclick="window.open('${esc(det.floor_plan_image)}','_blank')">
             <div style="margin-top:8px;">
               <button class="btn-sm btn-danger" onclick="deleteFloorPlan('${id}')">削除</button>
             </div>
           </div>`
        : `<div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">間取り図はまだアップロードされていません</div>`
      }
      <input type="file" id="fl-up" accept="image/*" style="display:none"
             onchange="uploadFloorPlan('${id}',this.files[0])">
      <button class="btn-sm" onclick="document.getElementById('fl-up').click()">📤 間取り図をアップロード</button>
    </div>
  ` : '';

  // ── チェックリスト HTML ──
  const clItems = state.checklistItems.filter(i => i.property_type === prop.type || i.property_type === 'both');
  const seasons = [
    { key:'spring', label:'🌸 春' }, { key:'summer', label:'☀️ 夏' },
    { key:'fall',   label:'🍂 秋' }, { key:'winter', label:'❄️ 冬' },
    { key:'all',    label:'📅 通年' },
  ];
  // 年度スイッチャー用：チェック済み年度一覧（現在年度は必ず含む）
  const recordedYears = [...new Set(checks.map(c => c.year).filter(Boolean))];
  if (!recordedYears.includes(state.detailYear)) recordedYears.push(state.detailYear);
  recordedYears.sort((a, b) => b - a);

  const yearSwitcherHtml = `
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;">
      ${recordedYears.map(y => `
        <button class="filter-tab ${y === state.detailYear ? 'active' : ''}"
                style="font-size:11px;padding:4px 12px;"
                onclick="switchChecklistYear('${id}',${y})">${y}年度</button>
      `).join('')}
    </div>
  `;

  // 選択年度のチェックだけ絞り込む
  const checksThisYear = checks.filter(c => c.year === state.detailYear);

  const checklistHtml = seasons.map(({ key, label }) => {
    const items = clItems.filter(i => i.season === key);
    if (!items.length) return '';
    return `
      <div style="margin-bottom:14px;">
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:6px;">${label}</div>
        ${items.map(item => {
          const chk     = checksThisYear.find(c => c.item_id === item.id);
          const checked = chk?.is_checked || false;
          return `<div class="check-item">
            <input type="checkbox" ${checked ? 'checked' : ''}
              onchange="toggleCheck('${id}','${item.id}',this.checked)"
              style="width:15px;height:15px;cursor:pointer;flex-shrink:0;">
            <span style="font-size:13px;${checked ? 'color:var(--text-muted);text-decoration:line-through;' : ''}">${esc(item.label)}</span>
          </div>`;
        }).join('')}
      </div>`;
  }).join('');

  // ── 実施記録 HTML ──
  const logsHtml = logs.length
    ? logs.map(log => `
        <div class="log-row">
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;">${esc(log.task_type)}</div>
            <div style="font-size:11px;color:var(--text-muted);">
              実施：${log.performed_date}
              ${log.next_scheduled_date ? ` ／ 次回目安：${log.next_scheduled_date}` : ''}
            </div>
            ${log.memo ? `<div style="font-size:11px;color:var(--text-secondary);margin-top:2px;">${esc(log.memo)}</div>` : ''}
            ${renderLogPhotos(log.photo_urls)}
          </div>
          <button class="btn-sm btn-danger" onclick="deleteLog('${log.id}','${id}')">削除</button>
        </div>`)
      .join('')
    : `<div style="font-size:12px;color:var(--text-muted);">実施記録がありません</div>`;

  // ── 築年月表示（中古住宅） ──
  const builtDisplay = !isLand && det.built_date ? displayBuiltDate(det.built_date) : null;

  el.innerHTML = `
    <!-- ヘッダー -->
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
        <button class="btn-back" onclick="showList()">← 一覧へ</button>
        <div>
          <div class="page-title">
            ${isLand ? '🌐' : '🏡'}
            ${esc(prop.property_name || prop.address || prop.code || '（名称未入力）')}
          </div>
          <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center;">
            ${statusBadge(prop.status)}
            ${det.suumo_listed  ? '<span class="badge-suumo">SUUMO掲載</span>' : ''}
            ${det.hp_listed     ? '<span class="badge-hp">🌐 HP掲載</span>' : ''}
            ${det.for_sale_sign ? '<span class="badge-sign">🪧 売看板あり</span>' : ''}
            ${isLand ? '<span class="badge-land">土地</span>' : '<span class="badge-house">中古住宅</span>'}
            ${det.transaction_type === 'owner'   ? '<span class="badge-owner">売主</span>'   : ''}
            ${det.transaction_type === 'broker'  ? '<span class="badge-broker">仲介</span>'  : ''}
            ${det.transaction_type === 'managed' ? '<span class="badge-managed">管理物件</span>' : ''}
            ${prop.is_sold ? '<span class="badge-done">売買完了</span>' : ''}
          </div>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn-secondary" onclick="showCost('${id}')">📊 原価管理</button>
        <button class="btn-primary" onclick="openEditModal()">✏️ 編集</button>
        <button class="btn-danger"  onclick="confirmDelete('${id}')">🗑 削除</button>
      </div>
    </div>

    <!-- 基本情報 ＋ 詳細情報 -->
    <div class="two-col" style="margin-bottom:16px;">
      <div class="section">
        <div class="section-title"><span class="icon">📋</span>基本情報</div>
        <table class="info-table">
          ${prop.property_name ? `<tr><th>物件名</th><td>${esc(prop.property_name)}</td></tr>` : ''}
          <tr><th>コード</th><td>${esc(prop.code||'—')}</td></tr>
          <tr><th>物件種別</th><td>${isLand ? '土地' : '中古住宅'}</td></tr>
          <tr><th>掲載状況</th><td>${statusLabel(prop.status)}${det.suumo_listed ? '　<span class="badge-suumo">SUUMO掲載</span>' : ''}${det.hp_listed ? '　<span class="badge-hp">🌐 HP掲載</span>' : ''}${det.for_sale_sign ? '　<span class="badge-sign">🪧 売看板あり</span>' : ''}</td></tr>
          <tr><th>情報公開日</th><td>${det.publish_date || '—'}</td></tr>
          <tr><th>取引態様</th><td>${transactionLabel(det.transaction_type)}</td></tr>
          <tr><th>販売形態</th><td>${saleTypeLabel(det.sale_type)}</td></tr>
          <tr><th>販売価格</th><td>${prop.price ? prop.price.toLocaleString()+'万円' : '—'}</td></tr>
          ${det.brokerage_fee ? `<tr><th>仲介手数料</th><td>${esc(det.brokerage_fee)}</td></tr>` : ''}
          <tr><th>住所</th><td>${esc(prop.address||'—')}${mapsLink}</td></tr>
          <tr><th>権利</th><td>${esc(det.rights||'—')}</td></tr>
          <tr><th>売買完了</th><td>${prop.is_sold ? '✅ 完了' : '—'}</td></tr>
          ${prop.notes ? `<tr><th>備考</th><td style="white-space:pre-wrap;">${esc(prop.notes)}</td></tr>` : ''}
        </table>
      </div>

      <div class="section">
        <div class="section-title"><span class="icon">📐</span>詳細情報</div>
        <table class="info-table">
          ${isLand ? `
            <tr><th>面積（㎡）</th><td>${det.area_sqm??'—'}</td></tr>
            <tr><th>面積（坪）</th><td>${det.area_tsubo??'—'}</td></tr>
            <tr><th>土地状況</th><td>${esc(det.land_condition||'—')}</td></tr>
            <tr><th>用途地域</th><td>${esc(det.zoning||'—')}</td></tr>
            <tr><th>建ぺい率</th><td>${det.building_coverage_ratio!=null ? det.building_coverage_ratio+'%' : '—'}</td></tr>
            <tr><th>容積率</th><td>${det.floor_area_ratio!=null ? det.floor_area_ratio+'%' : '—'}</td></tr>
            <tr><th>他の法令</th><td>${esc(det.other_laws||'—')}</td></tr>
          ` : `
            <tr><th>土地面積（㎡）</th><td>${det.land_area_sqm??'—'}</td></tr>
            <tr><th>土地面積（坪）</th><td>${det.land_area_tsubo??'—'}</td></tr>
            <tr><th>建物面積（㎡）</th><td>${det.building_area_sqm??'—'}</td></tr>
            <tr><th>建物面積（坪）</th><td>${det.building_area_tsubo??'—'}</td></tr>
            <tr><th>築年月</th><td>${builtDisplay || '—'}</td></tr>
            <tr><th>間取</th><td>${esc(det.floor_plan||'—')}</td></tr>
            <tr><th>増築・リフォーム歴</th><td style="white-space:pre-wrap;">${esc(det.renovation_history||'—')}</td></tr>
            <tr><th>用途地域</th><td>${esc(det.zoning||'—')}</td></tr>
            <tr><th>建ぺい率</th><td>${det.building_coverage_ratio!=null ? det.building_coverage_ratio+'%' : '—'}</td></tr>
            <tr><th>容積率</th><td>${det.floor_area_ratio!=null ? det.floor_area_ratio+'%' : '—'}</td></tr>
            <tr><th>他の法令</th><td>${esc(det.other_laws||'—')}</td></tr>
          `}
          <tr><th>道路幅員</th><td>${esc(det.road_width||'—')}</td></tr>
          <tr><th>間口</th><td>${esc(det.frontage||'—')}</td></tr>
          <tr><th>学区（小）</th><td>${esc(det.school_elementary||'—')}</td></tr>
          <tr><th>学区（中）</th><td>${esc(det.school_junior||'—')}</td></tr>
          <tr><th>上水道</th><td>${esc(det.water_supply||'—')}</td></tr>
          <tr><th>下水道</th><td>${esc(det.sewage||'—')}</td></tr>
          <tr><th>埋蔵</th><td>${esc(det.buried_artifacts||'—')}</td></tr>
          <tr><th>取得書類</th><td>${docsDisplay}</td></tr>
        </table>
      </div>
    </div>

    <!-- 写真 -->
    <div class="section" style="margin-bottom:16px;">
      <div class="section-title"><span class="icon">📷</span>物件写真</div>
      ${photoHtml}
    </div>

    <!-- 間取り図（中古住宅のみ） -->
    ${floorHtml}

    <!-- チェックリスト ＋ 実施記録 -->
    <div class="two-col" style="margin-top:16px;">
      <div class="section">
        <div class="section-title" style="justify-content:space-between;">
          <span><span class="icon">✅</span>管理チェックリスト</span>
          <span style="font-size:11px;color:var(--text-muted);font-weight:400;">${state.detailYear}年度</span>
        </div>
        ${yearSwitcherHtml}
        ${checklistHtml || '<div style="font-size:12px;color:var(--text-muted);">項目がありません</div>'}
      </div>
      <div class="section">

async function renderLogs(filterPropId) {
  filterPropId     = filterPropId || '';
  state.logsFilter = filterPropId;
  const el         = document.getElementById('content');

  const [propsRes, logsRes] = await Promise.all([
    db.from('properties').select('id, code, address, type').order('created_at', { ascending: false }),
    (() => {
      let q = db.from('task_logs')
        .select('*, properties(id, code, address, type)')
        .order('performed_date', { ascending: false });
      if (filterPropId) q = q.eq('property_id', filterPropId);
      return q;
    })(),
  ]);

  const allProps = propsRes.data || [];
  const logs     = logsRes.data  || [];

  const propOpts = allProps.map(p =>
    `<option value="${p.id}" ${p.id === filterPropId ? 'selected' : ''}>${p.code ? p.code+' ' : ''}${p.address || ''}</option>`
  ).join('');

  const rowsHtml = logs.length
    ? logs.map(log => {
        const p = log.properties || {};
        return `<tr>
          <td>${log.performed_date}</td>
          <td>${p.type === 'land' ? '<span class="badge-land">土地</span>' : '<span class="badge-house">中古住宅</span>'}</td>
          <td>
            <a href="#" onclick="showDetail('${p.id}');return false;"
               style="color:var(--accent);text-decoration:none;font-size:12px;">
              ${esc((p.code ? p.code+' ' : '') + (p.address||''))}
            </a>
          </td>
          <td>${esc(log.task_type)}</td>
          <td>${log.next_scheduled_date || '—'}</td>
          <td style="font-size:11px;color:var(--text-secondary);max-width:200px;">${esc(log.memo||'')}</td>
          <td>${renderLogPhotos(log.photo_urls)}</td>
          <td><button class="btn-sm btn-danger" onclick="deleteLogFromTable('${log.id}')">削除</button></td>
        </tr>`;
      }).join('')
    : `<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:24px;">記録がありません</td></tr>`;

  el.innerHTML = `
    <div class="page-header">
      <div class="page-title">📋 記録台帳</div>
      <button class="btn-primary" onclick="openLogModal('')">＋ 記録を追加</button>
    </div>
    <div class="section">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
        <span style="font-size:12px;color:var(--text-muted);white-space:nowrap;">物件で絞り込み：</span>
        <select class="qs-control" style="max-width:320px;" onchange="renderLogs(this.value)">
          <option value="">全物件</option>${propOpts}
        </select>
      </div>
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead>
            <tr>
              <th>実施日</th><th>種別</th><th>物件</th>
              <th>作業内容</th><th>次回目安</th><th>メモ</th><th>写真</th><th></th>
            </tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
    </div>
  `;
}

async function saveProperty() {
  const id     = document.getElementById('f-id').value;
  const type   = document.getElementById('f-type').value;
  const isLand = type === 'land';

  const propData = {
    type,
    property_name: document.getElementById('f-name').value.trim() || null,
    code:    document.getElementById('f-code').value.trim()    || null,
    status:  document.getElementById('f-status').value,
    address: document.getElementById('f-address').value.trim() || null,
    price:   parseFloat(document.getElementById('f-price').value) || null,
    is_sold: document.getElementById('f-sold').checked,
    notes:   document.getElementById('f-notes').value.trim()   || null,
  };

  let propId;
  if (id) {
    const { error } = await db.from('properties').update(propData).eq('id', id);
    if (error) { toast('保存失敗: ' + error.message, 'error'); return; }
    propId = id;
  } else {
    const { data, error } = await db.from('properties').insert(propData).select().single();
    if (error) { toast('保存失敗: ' + error.message, 'error'); return; }
    propId = data.id;
  }

  // 取得書類
  const selectedDocs = DOC_OPTIONS.filter((_, i) => document.getElementById(`f-doc-${i}`)?.checked);

  const detData = {
    property_id:       propId,
    school_elementary: document.getElementById('f-school-el').value.trim()  || null,
    school_junior:     document.getElementById('f-school-jr').value.trim()  || null,
    water_supply:      document.getElementById('f-water').value             || null,
    sewage:            document.getElementById('f-sewage').value            || null,
    buried_artifacts:  document.getElementById('f-buried').value            || null,
    documents:         selectedDocs.length ? JSON.stringify(selectedDocs)   : null,
    zoning:            document.getElementById('f-zoning')?.value.trim()    || null,
    other_laws:        document.getElementById('f-other-laws')?.value.trim()|| null,
    building_coverage_ratio: parseFloat(document.getElementById('f-bcr')?.value) || null,
    floor_area_ratio:        parseFloat(document.getElementById('f-far')?.value) || null,
    road_width:        document.getElementById('f-road-width').value.trim() || null,
    frontage:          document.getElementById('f-frontage').value.trim()   || null,
    rights:            document.getElementById('f-rights').value.trim()     || null,
    transaction_type:  document.getElementById('f-trans').value             || null,
    sale_type:         document.getElementById('f-sale-type')?.value         || null,
    brokerage_fee:     document.getElementById('f-brokerage').value.trim()  || null,
    suumo_listed:      document.getElementById('f-suumo').checked,
    hp_listed:         document.getElementById('f-hp').checked,
    for_sale_sign:     document.getElementById('f-sign').checked,
    publish_date:      document.getElementById('f-publish-date').value      || null,
  };

  if (isLand) {

  }

  const { error: dErr } = await db.from('property_details')
    .upsert(detData, { onConflict: 'property_id' });

async function saveLog() {
  const propId  = document.getElementById('log-prop').value;
  const logType = document.getElementById('log-type').value;
  const date    = document.getElementById('log-date').value;

  if (!propId) { toast('物件を選択してください', 'error'); return; }
  if (!date)   { toast('実施日を入力してください', 'error'); return; }

  // ① ログを保存してIDを取得
  const { data: newLog, error } = await db.from('task_logs').insert({
    property_id:         propId,
    task_type:           logType,
    performed_date:      date,
    next_scheduled_date: document.getElementById('log-next').value || null,
    memo:                document.getElementById('log-memo').value.trim() || null,
  }).select().single();

  if (error) { toast('保存失敗: ' + error.message, 'error'); return; }

  // ② 写真アップロード
  const fileInput = document.getElementById('log-photo-input');
  const files     = fileInput?.files ? Array.from(fileInput.files).slice(0, 3) : [];
  const photoUrls = [];

  if (files.length > 0) {
    toast('写真をアップロード中…', 'info');
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const ext  = file.name.split('.').pop().toLowerCase().replace(/[^a-z0-9]/g, '') || 'jpg';
      const path = `task-logs/${newLog.id}/${Date.now()}_${i}.${ext}`;

      const { error: upErr } = await db.storage
        .from('property-photos')
        .upload(path, file, { upsert: true, contentType: file.type });

      if (upErr) { toast(`写真${i+1}のアップロード失敗: ${upErr.message}`, 'error'); continue; }

      const { data: urlData } = db.storage.from('property-photos').getPublicUrl(path);
      if (urlData?.publicUrl) photoUrls.push(urlData.publicUrl);
    }

    if (photoUrls.length > 0) {
      await db.from('task_logs')
        .update({ photo_urls: JSON.stringify(photoUrls) })
        .eq('id', newLog.id);
    }
  }

  toast('記録を追加しました', 'success');
  closeModal();
  if (state.view === 'detail') await renderDetail(state.propId);
  else await renderLogs(state.logsFilter);
}

// ════════════════════════════════════════════════════════════

async function uploadPhotos(propId, files) {
  if (!files || files.length === 0) return;

  // 現在の枚数を取得
  const { count, error: cntErr } = await db
    .from('property_photos')
    .select('*', { count: 'exact', head: true })
    .eq('property_id', propId);

  if (cntErr) { toast('写真数の確認に失敗しました: ' + cntErr.message, 'error'); return; }

  const currentCount = count || 0;
  const remaining    = 6 - currentCount;

  if (remaining <= 0) {
    toast('写真は最大 6 枚です', 'error');
    return;
  }

  const toUpload = Array.from(files).slice(0, remaining);
  toast(`${toUpload.length} 枚をアップロード中…`, 'info');

  let successCount = 0;

  for (let i = 0; i < toUpload.length; i++) {
    const file = toUpload[i];
    const ext  = file.name.split('.').pop().toLowerCase().replace(/[^a-z0-9]/g, '') || 'jpg';
    const path = `${propId}/${Date.now()}_${i}.${ext}`;

    // ① Storage にアップロード
    const { error: upErr } = await db.storage
      .from('property-photos')
      .upload(path, file, { upsert: true, contentType: file.type });

    if (upErr) {
      toast(`写真${i+1}のアップロード失敗: ${upErr.message}`, 'error');
      continue;
    }

    // ② 公開URLを取得
    const { data: urlData } = db.storage.from('property-photos').getPublicUrl(path);
    const publicUrl = urlData?.publicUrl;

    if (!publicUrl) {
      toast(`写真${i+1}のURL取得失敗`, 'error');
      continue;
    }

    // ③ DBに登録
    const { error: insErr } = await db.from('property_photos').insert({
      property_id:  propId,
      url:          publicUrl,
      storage_path: path,
      order_index:  currentCount + i,
    });

    if (insErr) {
      toast(`写真${i+1}のDB登録失敗: ${insErr.message}`, 'error');
      // Storageから削除してロールバック
      await db.storage.from('property-photos').remove([path]);
      continue;
    }

    successCount++;
  }

  if (successCount > 0) {
    toast(`${successCount} 枚の写真を追加しました`, 'success');
  }
  await renderDetail(propId);
}

function toWareki(year, month) {
  if (!year) return '';
  year  = parseInt(year);
  month = parseInt(month) || 0;
  let era, base;
  if (year > 2019 || (year === 2019 && month >= 5)) { era = '令和'; base = 2018; }
  else if (year > 1989 || (year === 1989 && month >= 1)) { era = '平成'; base = 1988; }
  else if (year >= 1926) { era = '昭和'; base = 1925; }
  else if (year >= 1912) { era = '大正'; base = 1911; }
  else return `${year}年`;
  const n = year - base;
  return era + (n === 1 ? '元' : n) + '年';
}

function updateBuiltDisplay() {
  const yearEl  = document.getElementById('f-built-year');
  const monthEl = document.getElementById('f-built-month');
  const dispEl  = document.getElementById('built-display');
  if (!dispEl) return;
  const year  = yearEl?.value;
  const month = monthEl?.value;
  if (!year) { dispEl.textContent = ''; return; }
  const wareki  = toWareki(year, month);
  const age     = new Date().getFullYear() - parseInt(year);
  const monthStr = month ? `${month}月` : '';
  dispEl.textContent = `${year}年${monthStr}　→　${wareki}${monthStr}　（築${age >= 0 ? age : '?'}年）`;
}

function displayBuiltDate(builtDate) {
  if (!builtDate) return '—';
  const ym  = builtDate.match(/(\d{4})/);
  const mm  = builtDate.match(/(\d{1,2})月/);
  if (!ym) return esc(builtDate);
  const year  = parseInt(ym[1]);
  const month = mm ? parseInt(mm[1]) : 0;
  const age   = new Date().getFullYear() - year;
  const wareki = toWareki(year, month);
  const mStr   = month ? `${month}月` : '';
  return `${esc(builtDate)}　<span style="color:var(--accent);font-size:12px;">${wareki}${mStr}　築${age}年</span>`;
}

// ════════════════════════════════════════════════════════════
// 仲介手数料 自動計算
// ════════════════════════════════════════════════════════════

function calcBrokerageAmount(priceMan) {
  // priceMan: 万円単位の数値
  if (!priceMan || priceMan <= 0) return null;
  const price = priceMan * 10000; // 円に変換
  let fee;
  if (price <= 2000000) {
    fee = price * 0.05;
  } else if (price <= 4000000) {
    fee = price * 0.04 + 20000;
  } else {
    fee = price * 0.03 + 60000;
  }
  return Math.floor(fee * 1.1); // 消費税10%込み・端数切捨て
}

function calcBrokerageFee() {
  const transEl = document.getElementById('f-trans');
  const hintEl  = document.getElementById('brokerage-hint');
  if (!transEl || !hintEl) return;
  if (transEl.value !== 'broker') return;

  const price  = parseFloat(document.getElementById('f-price')?.value);
  const amount = calcBrokerageAmount(price);
  if (amount) {
    const formatted = amount.toLocaleString();
    hintEl.textContent = `上限額（宅建業法）: ${formatted}円（税込）`;
    hintEl.style.color = 'var(--accent)';
    window._calcFeeStr = `${formatted}円（税込）`;
  } else {
    hintEl.textContent = '販売価格を入力すると上限額を自動計算します';
    hintEl.style.color = 'var(--text-muted)';
    window._calcFeeStr = '';
  }
}

function applyCalcFee() {
  const input = document.getElementById('f-brokerage');
  if (input && window._calcFeeStr) {
    input.value = window._calcFeeStr;
  }
}

function onStatusChange() {
  const status = document.getElementById('f-status')?.value;
  const active = status === 'active';
  ['f-suumo', 'f-hp', 'f-sign'].forEach(id => {
    const inp = document.getElementById(id);
    if (!inp) return;
    const lbl = inp.closest('.doc-check-label');
    inp.disabled = !active;
    if (!active) {
      inp.checked = false;
      lbl?.classList.remove('checked');
    }
    if (lbl) {
      lbl.style.opacity       = active ? '' : '0.4';
      lbl.style.pointerEvents = active ? '' : 'none';
      lbl.style.cursor        = active ? '' : 'not-allowed';
    }
  });
}

function onTransChange() {
  const transEl = document.getElementById('f-trans');
  const rowEl   = document.getElementById('brokerage-row');
  if (!transEl || !rowEl) return;
  if (transEl.value === 'owner' || transEl.value === 'managed') {
    rowEl.style.display = 'none';
  } else {
    rowEl.style.display = '';
    calcBrokerageFee();
  }
}

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `toast toast-${type}`;
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => el.classList.add('hidden'), 3500);
}

function calcCostSummary() {
  const isHouse = document.getElementById('c-land-acq-cost') !== null;

  // ── 1. 仕入関連 ──────────────────────────────────────────
  let acqCost;
  if (isHouse) {
    const bldInc = costVal('c-bld-acq-cost');
    const bldExcl = bldInc > 0 ? Math.round(bldInc / 1.1) : 0;
    acqCost = costVal('c-land-acq-cost') + bldExcl;
  } else {
    acqCost = costVal('c-acq-cost');
  }
  const sub1 = acqCost + costVal('c-broker-fee') + costVal('c-acq-tax')
             + costVal('c-transfer-reg') + costVal('c-stamp-tax') + costVal('c-survey-purchase')
             + costVal('c-demolition') + costVal('c-mortgage-release') + costVal('c-other-purchase');

  // ── 2. 施工関連 ──────────────────────────────────────────
  const sub2 = costVal('c-land-prep') + costVal('c-construction') + costVal('c-design')
             + costVal('c-performance-cert') + costVal('c-ground-warranty')
             + costVal('c-survey-sales') + costVal('c-furniture')
             + costVal('c-other-construction');

  // ── 3. 登記・行政 ─────────────────────────────────────
  const sub3 = costVal('c-reg-survey') + costVal('c-farmland') + costVal('c-dev-permit')
             + costVal('c-other-reg');

  // ── 4. 販売費（一括） ──────────────────────────────────
  const sub4 = costVal('c-planning') + costVal('c-handover-finish')
             + costVal('c-sales-broker') + costVal('c-sales-office')
             + costVal('c-handover-docs') + costVal('c-other-sales');

  // ── 5. 積み上げ（年毎・月毎・不定期） ────────────────────
  const sub5 = periodicTotal('hoa_annual') + periodicTotal('tax_annual')
             + periodicTotal('fire_annual')
             + periodicTotal('water_monthly') + periodicTotal('electricity_monthly') + periodicTotal('gas_monthly')
             + periodicTotal('irregular_ad') + periodicTotal('irregular_maint')
             + periodicTotal('irregular_labor') + periodicTotal('irregular_other');

  const total = sub1 + sub2 + sub3 + sub4 + sub5;

  const priceEl = document.getElementById('c-prop-price');
  const price   = priceEl ? (parseFloat(priceEl.dataset.price) || 0) * 10000 : 0;
  const grossProfit = price - total;
  const grossMargin = price > 0 ? (grossProfit / price * 100) : 0;

  const fmt = v => Math.round(v).toLocaleString('ja-JP');

  const setSub = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = fmt(v) + ' 円'; };
  setSub('sub1', sub1); setSub('sub2', sub2); setSub('sub3', sub3);
  setSub('sub4', sub4); setSub('sub5', sub5);

  const summaryEl = document.getElementById('cost-summary');
  if (!summaryEl) return;

  const srow = (label, val, style) =>
    `<tr>
      <th style="padding:6px 10px 6px 0;text-align:left;font-weight:500;color:var(--text-secondary);font-size:12px;white-space:nowrap;border-bottom:1px solid var(--border);">${label}</th>
      <td style="padding:6px 0 6px 10px;text-align:right;font-size:13px;font-weight:600;border-bottom:1px solid var(--border);${style||''}">${fmt(val)} 円</td>
    </tr>`;

  summaryEl.innerHTML = `
    <table style="width:100%;border-collapse:collapse;">
      <tbody>
        ${srow('仕入関連', sub1)}
        ${srow('施工関連', sub2)}
        ${srow('登記・行政', sub3)}
        ${srow('販売費', sub4)}
        ${srow('積み上げ', sub5)}
        ${srow('総原価', total, 'color:var(--red);font-size:14px;')}
        ${srow('販売価格', price)}
        ${srow('粗利', grossProfit, grossProfit >= 0 ? 'color:var(--green);font-size:14px;' : 'color:var(--red);font-size:14px;')}
        <tr>
          <th style="padding:8px 10px 4px 0;text-align:left;font-weight:500;color:var(--text-secondary);font-size:12px;">粗利率</th>
          <td style="padding:8px 0 4px 10px;text-align:right;font-size:18px;font-weight:700;${grossMargin >= 0 ? 'color:var(--green)' : 'color:var(--red)'}">${grossMargin.toFixed(1)}%</td>
        </tr>
      </tbody>
    </table>
  `;
}

function calcBldExcl() {
  const inc  = parseFloat(document.getElementById('c-bld-acq-cost')?.value) || 0;
  const excl = inc > 0 ? Math.round(inc / 1.1) : 0;
  const el   = document.getElementById('c-bld-excl-disp');
  if (el) el.textContent = inc > 0 ? `税別: ${excl.toLocaleString('ja-JP')} 円` : '';
  calcCostSummary();
}

function calcPurchaseBrokerFee() {
  const isHouse = document.getElementById('c-land-acq-cost') !== null;
  const baseVal = isHouse
    ? (parseFloat(document.getElementById('c-land-acq-cost')?.value) || 0)
    : (parseFloat(document.getElementById('c-acq-cost')?.value) || 0);
  if (baseVal <= 0) return;
  const fee = Math.round((baseVal * 0.03 + 60000) * 1.1);
  const feeEl = document.getElementById('c-broker-fee');
  if (feeEl) { feeEl.value = fee; calcCostSummary(); }
}

async function addPeriodicRecord(propId, category, inputType) {
  let year = null, month = null, date = null, memo = null;
  const amount = parseFloat(document.getElementById(`p-amt-${category}`)?.value);
  if (!amount || amount <= 0) { toast('金額を入力してください', 'error'); return; }

  if (inputType === 'annual') {
    year = parseInt(document.getElementById(`p-year-${category}`)?.value) || new Date().getFullYear();
  } else if (inputType === 'monthly') {
    year  = parseInt(document.getElementById(`p-year-${category}`)?.value)  || new Date().getFullYear();
    month = parseInt(document.getElementById(`p-month-${category}`)?.value) || 1;
  } else {
    date = document.getElementById(`p-date-${category}`)?.value || null;
    memo = document.getElementById(`p-memo-${category}`)?.value?.trim() || null;
    if (!date) { toast('日付を入力してください', 'error'); return; }
  }

  const rec = { property_id: propId, category, amount };
  if (year  != null) rec.record_year  = year;
  if (month != null) rec.record_month = month;
  if (date  != null) rec.record_date  = date;
  if (memo  != null) rec.memo         = memo;

  const { error } = await db.from('cost_periodic_records').insert(rec);
  if (error) { toast('追加失敗: ' + error.message, 'error'); return; }
  await renderCost(propId);
}

async function deletePeriodicRecord(id, propId) {
  const { error } = await db.from('cost_periodic_records').delete().eq('id', id);
  if (error) { toast('削除失敗: ' + error.message, 'error'); return; }
  await renderCost(propId);
}

async function saveCost(propId) {
  const btn = document.getElementById('save-cost-btn');
  if (btn) { btn.disabled = true; btn.textContent = '保存中…'; }
  const toNum = id => { const v = costVal(id); return v > 0 ? v : null; };
  const isHouse = document.getElementById('c-land-acq-cost') !== null;

  const data = {
    property_id:           propId,
    acquisition_date:      document.getElementById('c-acq-date')?.value  || null,
    acquisition_cost:      isHouse ? null : toNum('c-acq-cost'),
    land_acquisition_cost: isHouse ? toNum('c-land-acq-cost') : null,
    building_acquisition_cost: isHouse ? toNum('c-bld-acq-cost') : null,
    broker_fee:            toNum('c-broker-fee'),
    acquisition_tax:       toNum('c-acq-tax'),
    transfer_reg:          toNum('c-transfer-reg'),
    stamp_tax:             toNum('c-stamp-tax'),
    survey_purchase:       toNum('c-survey-purchase'),
    demolition:            toNum('c-demolition'),
    mortgage_release:      toNum('c-mortgage-release'),
    other_purchase:        toNum('c-other-purchase'),
    land_prep:             toNum('c-land-prep'),
    construction:          toNum('c-construction'),
    design_supervision:    toNum('c-design'),
    performance_cert:      toNum('c-performance-cert'),
    ground_warranty:       toNum('c-ground-warranty'),
    survey_sales:          toNum('c-survey-sales'),
    furniture:             toNum('c-furniture'),
    other_construction:    toNum('c-other-construction'),
    reg_survey:            toNum('c-reg-survey'),
    farmland:              toNum('c-farmland'),
    dev_permit:            toNum('c-dev-permit'),
    other_reg:             toNum('c-other-reg'),
    planning:              toNum('c-planning'),
    handover_finish:       toNum('c-handover-finish'),
    sales_broker_fee:      toNum('c-sales-broker'),
    sales_office:          toNum('c-sales-office'),
    handover_docs:         toNum('c-handover-docs'),
    other_sales:           toNum('c-other-sales'),
    updated_at:            new Date().toISOString(),
  };

  const { error } = await db.from('cost_management').upsert(data, { onConflict: 'property_id' });
  if (error) toast('保存失敗: ' + error.message, 'error');
  else toast('原価管理データを保存しました', 'success');
  if (btn) { btn.disabled = false; btn.textContent = '💾 保存'; }
}

async function renderCost(propId) {
  const el = document.getElementById('content');
  el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted);">読み込み中…</div>';

  const [propRes, costRes, periodicRes] = await Promise.all([
    db.from('properties').select('*, property_details(*)').eq('id', propId).single(),
    db.from('cost_management').select('*').eq('property_id', propId).maybeSingle(),
    db.from('cost_periodic_records').select('*').eq('property_id', propId).order('created_at', { ascending: false })
  ]);

  if (propRes.error) { toast('物件取得失敗: ' + propRes.error.message, 'error'); return; }

  const prop     = propRes.data;
  const c        = costRes.data || {};
  const allRecs  = periodicRes.data || [];
  const isHouse  = prop.type === 'house';
  const price    = prop.price || 0;
  const label    = esc(prop.property_name || prop.address || prop.code || '（名称未入力）');

  // ── 積み上げ合計を window._periodicTotals に保存 ──────────────────────────
  const cats = ['hoa_annual','tax_annual','fire_annual',
                'water_monthly','electricity_monthly','gas_monthly',
                'irregular_ad','irregular_maint','irregular_labor','irregular_other'];
  window._periodicTotals = {};
  cats.forEach(cat => {
    window._periodicTotals[cat] = allRecs
      .filter(r => r.category === cat)
      .reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
  });

  const autoBroker = price > 0 ? Math.round((price * 10000 * 0.03 + 60000) * 1.1) : '';
  const brokerFee  = c.broker_fee != null ? c.broker_fee : autoBroker;

  const v   = key => c[key] != null ? c[key] : '';
  const fmt = val => Math.round(val).toLocaleString('ja-JP');

  const ni = (id, val, oninput, extra) =>
    `<input id="${id}" type="number" step="1" class="qs-control"
      value="${val !== '' && val != null ? val : ''}"

  const subRow = (subId) =>

      <td style="padding:4px 10px 4px 0;font-size:12px;font-weight:600;color:var(--text-secondary);">小計</td>
      <td id="${subId}" style="padding:4px 0;font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap;text-align:right;padding-right:28px;">—</td>
    </tr>`;

  const sec = (title, icon, subId, rows) =>
    `<div class="section" style="margin-bottom:16px;">
      <div class="section-title"><span class="icon">${icon}</span>${title}</div>
      <table style="width:100%;border-collapse:collapse;">${rows}${subRow(subId)}</table>

  // ── 1. 仕入関連 ───────────────────────────────────────────────────────────

        <button type="button" onclick="calcPurchaseBrokerFee()"

                         .sort((a,b) => (b.record_date||'') > (a.record_date||'') ? 1 : -1);
    const total = window._periodicTotals[category] || 0;
    const rows  = items.map(r =>
      `<tr>
        <td style="padding:3px 8px;font-size:12px;color:var(--text-secondary);white-space:nowrap;">${r.record_date || '—'}</td>
        <td style="padding:3px 8px;font-size:12px;text-align:right;white-space:nowrap;">${fmt(r.amount)}</td>
        <td style="padding:3px 8px;font-size:12px;color:var(--text-muted);">円</td>
        <td style="padding:3px 8px;font-size:11px;color:var(--text-muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;">${r.memo ? esc(r.memo) : ''}</td>
        <td style="padding:3px 8px;"><button onclick="deletePeriodicRecord('${r.id}','${propId}')"
          style="font-size:10px;color:var(--red);background:none;border:1px solid var(--red);border-radius:4px;padding:1px 6px;cursor:pointer;">削除</button></td>
      </tr>`).join('');
    return `
      <div style="margin-bottom:14px;padding:10px;background:var(--bg-input);border-radius:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="font-size:13px;font-weight:500;">${catLabel}</span>
          <span style="font-size:12px;font-weight:700;color:var(--accent);">累計: ${fmt(total)} 円</span>
        </div>
        ${items.length > 0 ? `<table style="width:100%;border-collapse:collapse;margin-bottom:8px;">${rows}</table>` : ''}
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <input id="p-date-${category}" type="date" class="qs-control" style="width:150px;padding:4px 6px;">
          <input id="p-amt-${category}" type="number" step="1" class="qs-control" style="width:110px;padding:4px 6px;text-align:right;" placeholder="0">
          <span style="font-size:12px;color:var(--text-muted);">円</span>
          <input id="p-memo-${category}" type="text" class="qs-control" style="width:150px;padding:4px 6px;" placeholder="メモ（任意）">
          <button onclick="addPeriodicRecord('${propId}','${category}','irregular')"
            style="font-size:11px;color:var(--accent);background:var(--accent-dim);border:none;border-radius:4px;padding:4px 10px;cursor:pointer;">＋追加</button>
        </div>
      </div>`;
  };

  const waterTotal = (window._periodicTotals['water_monthly'] || 0)
                   + (window._periodicTotals['electricity_monthly'] || 0)
                   + (window._periodicTotals['gas_monthly'] || 0);

  const sec5Total = cats.reduce((s, cat) => s + (window._periodicTotals[cat] || 0), 0);
  const sec5 = `
    <div class="section" style="margin-bottom:16px;">
      <div class="section-title" style="justify-content:space-between;">
        <span><span class="icon">📅</span>積み上げ原価</span>
        <span id="sub5" style="font-size:12px;font-weight:600;color:var(--accent);">${fmt(sec5Total)} 円</span>
      </div>

      <div style="font-size:12px;font-weight:600;color:var(--text-secondary);padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:10px;">📆 年毎管理</div>
      ${annualSec('hoa_annual',  '町内会費')}
      ${annualSec('tax_annual',  '固定資産税・都市計画税')}
      ${annualSec('fire_annual', '火災保険料')}

      <div style="font-size:12px;font-weight:600;color:var(--text-secondary);padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:10px;">📅 月毎管理</div>
      ${monthlySec('water_monthly', '水道代')}
      ${monthlySec('electricity_monthly', '電気代')}
      ${monthlySec('gas_monthly', 'ガス代')}
      <div style="padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:12px;display:flex;justify-content:space-between;margin-bottom:14px;">
        <span style="color:var(--text-secondary);">水道光熱費 合計</span>
        <span style="font-weight:700;color:var(--accent);">${fmt(waterTotal)} 円</span>
      </div>

      <div style="font-size:12px;font-weight:600;color:var(--text-secondary);padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:10px;">📌 不定期積み上げ</div>
      ${irregularSec('irregular_ad',    '宣伝費')}
      ${irregularSec('irregular_maint', '敷地内整備費（草刈り・除雪・清掃など）')}
      ${irregularSec('irregular_labor', '人件費')}
      ${irregularSec('irregular_other', 'その他')}
    </div>`;

  // ── ページ組み立て ─────────────────────────────────────────────────────────
  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">📊 原価管理</div>
        <div class="page-sub">${label}</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn-cancel" onclick="showDetail('${propId}')">← 物件詳細に戻る</button>
        <button id="save-cost-btn" class="btn-primary" onclick="saveCost('${propId}')">💾 保存</button>
      </div>
    </div>

    <div style="display:flex;gap:16px;align-items:flex-start;">
      <div style="flex:1;min-width:0;">
        ${sec1}${sec2}${sec3}${sec4}${sec5}
      </div>
      <div style="width:260px;flex-shrink:0;">
        <div class="section" style="position:sticky;top:16px;">
          <div class="section-title"><span class="icon">📈</span>収支サマリー</div>
          <span id="c-prop-price" data-price="${price}"
            style="display:block;font-size:12px;color:var(--text-muted);margin-bottom:8px;">
            販売価格：${price ? price.toLocaleString() + ' 万円' : '未設定'}
          </span>
          <div id="cost-summary" style="font-size:13px;">—</div>
          <div style="margin-top:12px;">
            <button class="btn-primary" style="width:100%;" onclick="saveCost('${propId}')">💾 保存</button>
          </div>
        </div>
      </div>
    </div>
  `;

  calcCostSummary();
}

</script>
</body>
</html>
